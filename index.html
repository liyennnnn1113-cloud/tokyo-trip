<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tokyo Journey - V</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        :root {
            --bg-page: #f7f7f7;
            --primary-blue: #364c84;
            --sky-blue: #95b1ee;
            --light-green: #e7f1a8;
            --text-grey: #707070;
        }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-page); color: var(--primary-blue); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .soft-shadow { box-shadow: 0 10px 30px rgba(54, 76, 132, 0.04); }
        .glass-card { background: white; border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.8); }
        .itinerary-card { background: white; border-radius: 28px; padding: 24px; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        .date-card { width: 66px; height: 88px; border-radius: 20px; transition: 0.3s; background: white; flex-shrink: 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; margin: 0 6px; }
        .date-card.active { background-color: var(--light-green) !important; opacity: 1; box-shadow: 0 8px 15px rgba(231, 241, 168, 0.4); transform: scale(1.05); }
        
        .nav-btn { color: #CCCCCC; text-align: center; font-size: 11px; flex: 1; border: none; background: none; outline: none; transition: 0.3s; }
        .nav-btn.active { color: var(--primary-blue) !important; font-weight: bold; }
        
        .category-tag { font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 8px; background: #f1f1f1; color: var(--primary-blue); }
        .check-item { display: flex; align-items: center; gap: 12px; font-size: 14px; margin-bottom: 12px; color: var(--text-grey); }
        .check-item i { color: var(--sky-blue); font-size: 16px; }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <header class="p-8 pb-4 flex justify-between items-center">
        <div>
            <h1 id="pageTitle" class="text-3xl font-bold tracking-tight text-[var(--primary-blue)]">總覽</h1>
            <p id="pageSubTitle" class="text-sm text-[var(--text-grey)]">Tokyo Trip 2026</p>
        </div>
        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center soft-shadow font-bold text-[var(--primary-blue)]">V</div>
    </header>

    <main id="mainContent" class="px-6 fade-in">
        <!-- 總覽分頁 -->
        <div id="dashSection">
            <div class="flex flex-col gap-4">
                <div class="glass-card soft-shadow flex justify-between items-center">
                    <div class="text-center flex-1"><p class="text-[9px] opacity-40 font-bold uppercase">TPE</p><p class="text-lg font-bold">02:30</p></div>
                    <div class="px-3 opacity-30 text-[var(--sky-blue)]"><i class="fas fa-plane"></i></div>
                    <div class="text-center flex-1"><p class="text-[9px] opacity-40 font-bold uppercase">NRT</p><p class="text-lg font-bold">06:30</p></div>
                    <div class="ml-4 pl-4 border-l border-gray-100"><p class="text-[10px] font-bold">MM620</p><p class="text-[9px] opacity-40">05/22 Fri</p></div>
                </div>
                
                <div class="glass-card soft-shadow">
                    <h3 class="font-bold text-sm mb-4"><i class="fas fa-clipboard-check mr-2 text-[var(--sky-blue)]"></i>最後檢查</h3>
                    <div class="check-item"><i class="far fa-check-circle"></i>護照 (確認效期6個月以上)</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>身分證、簽證</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>錢包 (信用卡、台幣、外幣)</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>手機、相機</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>行動電源、電池 (隨身禁止托運)</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>萬用轉接頭、充電線</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>個人藥品、常備藥、保健品</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>眼鏡/隱形眼鏡、藥水</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>飯店預訂單、旅遊行程票券</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>鑰匙 (家裡、汽車)</div>
                    <div class="check-item"><i class="far fa-check-circle"></i>入境申請 (VJW)</div>
                </div>

                <div class="glass-card soft-shadow flex justify-around items-center">
                    <div class="text-center"><p class="text-[10px] opacity-40 font-bold mb-1 uppercase tracking-widest">Spent</p><p id="dashTotalExp" class="text-xl font-bold">NT$ 0</p></div>
                    <div class="h-10 w-px bg-gray-100"></div>
                    <div class="text-center"><p class="text-[10px] opacity-40 font-bold mb-1 uppercase tracking-widest">Days</p><p class="text-xl font-bold">7 天</p></div>
                </div>
            </div>
        </div>

        <!-- 行程分頁 -->
        <div id="itinerarySection" class="hidden">
            <div style="padding: 15px 0;">
                <div id="dateNav" class="flex overflow-x-auto py-2 space-x-1 no-scrollbar -mx-2 px-2"></div>
            </div>
            <h2 id="itiDateTitle" class="text-2xl font-bold italic mb-5 px-1">日期</h2>
            <div id="planList" class="flex flex-col gap-4"></div>
        </div>

        <!-- 支出分頁 -->
        <div id="expenseSection" class="hidden">
            <div class="glass-card soft-shadow p-10 text-center mb-6">
                <p class="text-xs opacity-40 uppercase tracking-widest mb-1 font-bold">Total Budget</p>
                <p id="totalCostDisplay" class="text-4xl font-bold text-[var(--primary-blue)]">NT$ 0</p>
            </div>
            <div class="flex gap-2 mb-6">
                <button id="btnStatDate" onclick="renderExpenses('date')" class="flex-1 py-3 rounded-2xl bg-[var(--primary-blue)] text-white text-xs font-bold soft-shadow">按日期統計</button>
                <button id="btnStatCat" onclick="renderExpenses('cat')" class="flex-1 py-3 rounded-2xl bg-white text-[var(--primary-blue)] text-xs font-bold soft-shadow">按類別統計</button>
            </div>
            <div id="expenseList" class="flex flex-col gap-6"></div>
        </div>
    </main>

    <!-- 底部導航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl h-24 flex justify-around items-center border-t border-gray-100 px-8 z-40">
        <button onclick="switchTab('dash')" class="nav-btn active" id="btn-das"><i class="fas fa-th-large text-xl mb-1"></i><br>總覽</button>
        <button onclick="switchTab('itinerary')" class="nav-btn" id="btn-iti"><i class="fas fa-calendar-alt text-xl mb-1"></i><br>行程</button>
        <button onclick="switchTab('expense')" class="nav-btn" id="btn-exp"><i class="fas fa-wallet text-xl mb-1"></i><br>支出</button>
    </nav>

    <script>
        const plans = {
            0: [
                {time:'21:30', cat:'🚗 移動', loc:'太平🔜桃園', desc:'台中-桃園 (約2小時)', map:'', twd:0},
                {time:'23:00', cat:'🚗 移動', loc:'桃園停車🔜機場', desc:'', map:'', twd:1500}
            ],
            1: [
                {time:'02:30', cat:'🚗 移動', loc:'桃園🔜成田', desc:'MM620 (02:30-06:30)', map:'', twd:9980},
                {time:'07:00', cat:'🚗 移動', loc:'成田🔜淺草 (Access特急)', desc:'1. 認準1號月台\n2. 螢幕顯示「西馬込」或「羽田空港」可直達\n3. 避開「上野」字樣', map:'', twd:275.1},
                {time:'09:00', cat:'🚗 移動', loc:'7-11 淺草雷門前店 行李寄放', desc:'寄放行李 9:00-17:00', map:'https://maps.app.goo.gl/Asakusa', twd:168},
                {time:'09:10', cat:'⛱ 景點', loc:'淺草寺 雷門', desc:'', map:'', twd:0},
                {time:'10:00', cat:'🧁 吃喝', loc:'Asakusa Unana', desc:'09:30–17:30', map:'https://maps.app.goo.gl/W6KkrCGFHDS9BiYh9', twd:0},
                {time:'10:05', cat:'🧁 吃喝', loc:'Ginza Brazil', desc:'09:00–15:00', map:'https://maps.app.goo.gl/W6KkrCGFHDS9BiYh9', twd:0},
                {time:'10:10', cat:'🧁 吃喝', loc:'淺草花月堂菠蘿麵包', desc:'', map:'https://maps.app.goo.gl/rL7w5i6vXrTtwjbK8', twd:0},
                {time:'10:15', cat:'🧁 吃喝', loc:'炸饅頭 / 人型餅', desc:'仲見世商店街', map:'https://maps.app.goo.gl/R5cXDP9FrmHijedW8', twd:0},
                {time:'10:20', cat:'🧁 吃喝', loc:'仲見世商店街 / 阿美橫町', desc:'', map:'https://maps.app.goo.gl/5ABPjydwkuMk6MQJ7', twd:0},
                {time:'11:00', cat:'🏖️ 景點', loc:'Asakusa ROX Spa', desc:'溫泉泡澡休息', map:'https://maps.app.goo.gl/Tnn2UzAAtHyXB9DC7', twd:0},
                {time:'13:00', cat:'🧁 吃喝', loc:'利久牛舌 / 拉麵鴨 to Negi', desc:'上野周邊美食', map:'https://maps.app.goo.gl/BJ9YyBNHvytJXjKD7', twd:0},
                {time:'13:30', cat:'🧁 吃喝', loc:'牛骨拉麺 磯川 上野店', desc:'', map:'https://maps.app.goo.gl/TzH63rWZojJ9Zyyf6', twd:0},
                {time:'16:00', cat:'🚗 移動', loc:'取行李 7-11 淺草雷門前店', desc:'', map:'', twd:0},
                {time:'16:30', cat:'🚗 移動', loc:'拿行李🔜民宿', desc:'', map:'https://maps.app.goo.gl/bxKxVsj82mHCG8Km7', twd:0},
                {time:'20:00', cat:'🏠 住宿', loc:'淺草住宿 5/22-5/24', desc:'', map:'https://maps.app.goo.gl/1TCiSAEcxVZUD4fBA', twd:3300}
            ],
            2: [
                {time:'11:00', cat:'🚗 移動', loc:'淺草🔜妙義神社', desc:'', map:'https://maps.app.goo.gl/iY9HLUDSBdS', twd:0},
                {time:'12:00', cat:'🏖️ 景點', loc:'妙義神社', desc:'', map:'', twd:0},
                {time:'13:00', cat:'🏖️ 景點', loc:'吉伊卡哇樂園 / 寶可夢中心', desc:'', map:'', twd:0},
                {time:'15:00', cat:'🏖️ 景點', loc:'豪德寺 / 東京鐵塔', desc:'', map:'', twd:0},
                {time:'19:00', cat:'🧁 吃喝', loc:'銀座 篝 (本店/大手町)', desc:'雞白湯拉麵', map:'', twd:1386},
                {time:'21:00', cat:'🧁 吃喝', loc:'いづも 池袋 居酒屋 / PATISSERIE TEN&', desc:'', map:'', twd:0}
            ],
            3: [
                {time:'08:30', cat:'🚗 移動', loc:'退房🔜寄行李 (安心之宿)', desc:'新宿站前店', map:'https://maps.app.goo.gl/QdcGhFprEnp5u9P56', twd:0},
                {time:'09:30', cat:'🚗 移動', loc:'安心之宿 行李寄放', desc:'5/24 9:00-5/25 22:00', map:'', twd:840},
                {time:'10:00', cat:'🚗 移動', loc:'新宿🔜鎌倉', desc:'10:20上車 🔜 11:29抵達片瀨江之島', map:'https://maps.app.goo.gl/MprDGgMmAzvkze5U8', twd:0},
                {time:'11:30', cat:'🏖️ 景點', loc:'鎌倉高校前 (平交道)', desc:'', map:'https://maps.app.goo.gl/8FGwRf9Z56ZHW8Rj7', twd:0},
                {time:'12:30', cat:'🏖️ 景點', loc:'錢洗辨財天 / 小町通商店街', desc:'吃午餐', map:'', twd:0},
                {time:'14:00', cat:'🚗 移動', loc:'包車到熱海', desc:'', map:'', twd:1875},
                {time:'15:30', cat:'🏖️ 景點', loc:'熱海散策', desc:'', map:'', twd:0},
                {time:'16:00', cat:'🧁 吃喝', loc:'熱海布丁 1號本店', desc:'', map:'', twd:0},
                {time:'16:30', cat:'🏖️ 景點', loc:'熱海陽光海灘', desc:'', map:'', twd:0},
                {time:'22:00', cat:'🏠 住宿', loc:'箱根住宿', desc:'', map:'', twd:1842}
            ],
            4: [
                {time:'10:00', cat:'🏖️ 景點', loc:'箱根玩耍 (週週券+車票)', desc:'', map:'', twd:1700},
                {time:'17:46', cat:'🚗 移動', loc:'箱根湯本🔜新宿', desc:'17:46出發 🔜 19:26抵達新宿', map:'', twd:0},
                {time:'20:00', cat:'🚗 移動', loc:'豪華膠囊旅館 安心之宿', desc:'拿行李', map:'', twd:0},
                {time:'21:00', cat:'🏠 住宿', loc:'新宿由緣溫泉旅館', desc:'', map:'https://maps.app.goo.gl/xokUDBs16WQmymNt6', twd:2763.5}
            ],
            5: [
                {time:'11:00', cat:'🚗 移動', loc:'退房寄放行李', desc:'', map:'', twd:0},
                {time:'13:00', cat:'🏖️ 景點', loc:'Chiikawa Bakery', desc:'Klook預約', map:'', twd:275},
                {time:'15:00', cat:'🧁 吃喝', loc:'Sweet Check / 澀谷鮮奶茶', desc:'', map:'', twd:0},
                {time:'17:00', cat:'🧁 吃喝', loc:'澀谷蛋包飯', desc:'', map:'', twd:0},
                {time:'22:10', cat:'🚗 移動', loc:'成田🔜桃園 (MM627)', desc:'返程航班', map:'', twd:0}
            ],
            6: [
                {time:'01:00', cat:'🚗 移動', loc:'返抵桃園機場', desc:'回到家了', map:'', twd:0}
            ]
        };

        const dates = [
            {d:'21',w:'THU',full:'05/21 Thu'},{d:'22',w:'FRI',full:'05/22 Fri'},{d:'23',w:'SAT',full:'05/23 Sat'},
            {d:'24',w:'SUN',full:'05/24 Sun'},{d:'25',w:'MON',full:'05/25 Mon'},{d:'26',w:'TUE',full:'05/26 Tue'},{d:'27',w:'WED',full:'05/27 Wed'}
        ];

        let currentDayIdx = 1;
        const el = (id) => document.getElementById(id);

        function switchTab(tab) {
            ['dash', 'itinerary', 'expense'].forEach(s => {
                const section = el(s + 'Section');
                const btn = el('btn-' + s.substring(0, 3));
                if(section) section.classList.add('hidden');
                if(btn) btn.classList.remove('active');
            });
            const target = el(tab + 'Section');
            const targetBtn = el('btn-' + tab.substring(0, 3));
            if(target) target.classList.remove('hidden');
            if(targetBtn) targetBtn.classList.add('active');
            if(el('pageTitle')) el('pageTitle').innerText = tab==='dash'?'總覽':(tab==='itinerary'?'行程':'支出');
            if(tab === 'expense') renderExpenses('date');
        }

        function setDay(i) {
            currentDayIdx = i;
            if(el('itiDateTitle')) el('itiDateTitle').innerText = dates[i].full;
            renderDates();
            renderPlans();
        }

        function renderDates() {
            const nav = el('dateNav');
            if(!nav) return;
            nav.innerHTML = dates.map((d, i) => `
                <div onclick="setDay(${i})" class="date-card soft-shadow ${i === currentDayIdx ? 'active' : ''}">
                    <span class="text-[10px] mb-1 font-bold uppercase">${d.w}</span>
                    <span class="text-lg font-bold">${d.d}</span>
                </div>
            `).join('');
        }

        function renderPlans() {
            const list = el('planList');
            if(!list) return;
            const dayPlans = (plans[currentDayIdx] || []).sort((a,b) => a.time.localeCompare(b.time));
            list.innerHTML = dayPlans.map((p) => `
                <div class="itinerary-card soft-shadow fade-in">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center space-x-2"><span class="category-tag">${p.cat}</span><span class="text-xs opacity-50 font-bold">${p.time}</span></div>
                            ${p.map ? `<button onclick="window.open('${p.map}')" class="text-[var(--sky-blue)]"><i class="fas fa-location-dot text-lg"></i></button>` : ''}
                        </div>
                        <h3 class="font-bold text-lg mb-1 text-[var(--primary-blue)]">${p.loc}</h3>
                        <p class="text-xs text-[var(--text-grey)] leading-relaxed whitespace-pre-line">${p.desc}</p>
                    </div>
                    ${p.twd > 0 ? `<div class="mt-4 text-[11px] font-black text-[var(--sky-blue)] flex justify-between border-t border-gray-50 pt-3"><span>預估支出</span><span>NT$ ${Math.round(p.twd).toLocaleString()}</span></div>` : ''}
                </div>
            `).join('');
        }

        function renderExpenses(mode) {
            const list = el('expenseList');
            let total = 0;
            let html = '';

            el('btnStatDate').className = mode==='date' ? 'flex-1 py-3 rounded-2xl bg-[var(--primary-blue)] text-white text-xs font-bold soft-shadow' : 'flex-1 py-3 rounded-2xl bg-white text-[var(--primary-blue)] text-xs font-bold soft-shadow';
            el('btnStatCat').className = mode==='cat' ? 'flex-1 py-3 rounded-2xl bg-[var(--primary-blue)] text-white text-xs font-bold soft-shadow' : 'flex-1 py-3 rounded-2xl bg-white text-[var(--primary-blue)] text-xs font-bold soft-shadow';

            if (mode === 'date') {
                Object.keys(plans).forEach(day => {
                    const dayItems = plans[day].filter(p => p.twd > 0);
                    if(dayItems.length > 0) {
                        let dayTotal = dayItems.reduce((sum, item) => sum + item.twd, 0);
                        html += `<div class="mb-2"><h4 class="text-[11px] font-black opacity-30 mb-2 uppercase tracking-widest">Day ${dates[day].d} (${dates[day].full}) - Total: NT$ ${Math.round(dayTotal).toLocaleString()}</h4>`;
                        dayItems.forEach(p => { html += `<div class="glass-card soft-shadow flex justify-between items-center py-4 mb-2"><div><span class="category-tag !bg-[#f7f7f7] mr-2">${p.cat}</span><span class="text-sm font-bold">${p.loc}</span></div><p class="font-bold text-sm">NT$ ${Math.round(p.twd).toLocaleString()}</p></div>`; });
                        html += `</div>`;
                    }
                });
            } else {
                const categories = ['🚗 移動', '🧁 吃喝', '🛍️ 購物', '🏖️ 景點', '🏠 住宿'];
                const catStats = {};
                categories.forEach(c => catStats[c] = { total: 0, items: [] });
                Object.keys(plans).forEach(day => {
                    plans[day].forEach(p => {
                        if(p.twd > 0 && catStats[p.cat]) {
                            catStats[p.cat].total += p.twd;
                            catStats[p.cat].items.push({...p, dayLabel: dates[day].d});
                        }
                    });
                });
                categories.forEach(c => {
                    if(catStats[c].total > 0) {
                        html += `<div class="mb-2"><h4 class="text-[11px] font-black opacity-30 mb-2 uppercase tracking-widest">${c} 總支出 - Total: NT$ ${Math.round(catStats[c].total).toLocaleString()}</h4>`;
                        catStats[c].items.forEach(item => { html += `<div class="glass-card soft-shadow flex justify-between items-center py-4 mb-2"><div><span class="text-[9px] opacity-40 mr-2">DAY ${item.dayLabel}</span><span class="text-sm font-bold">${item.loc}</span></div><p class="font-bold text-sm">NT$ ${Math.round(item.twd).toLocaleString()}</p></div>`; });
                        html += `</div>`;
                    }
                });
            }

            Object.values(plans).flat().forEach(p => total += (p.twd || 0));
            el('totalCostDisplay').innerText = `NT$ ${Math.round(total).toLocaleString()}`;
            el('dashTotalExp').innerText = `NT$ ${Math.round(total).toLocaleString()}`;
            list.innerHTML = html || '<p class="text-center opacity-20 py-10">尚無紀錄</p>';
        }

        setDay(1); 
        switchTab('dash');
    </script>
</body>
</html>
